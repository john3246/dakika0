services:
  - type: web
    name: dakika-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Create these variables in the Render dashboard:
      # DATABASE_URL (sync from Neon/Supabase)
      # JWT_SECRET
